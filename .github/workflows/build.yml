name: Build & Release

on:
  pull_request:
    branches: [main]
  push:
    tags:
      - 'v*.*.*'

env:
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download platform binaries
        run: npm run download-binaries

      - name: Verify binaries (no bloat)
        shell: bash
        run: |
          echo "Contents of resources/bin/:"
          find resources/bin/ -type f | head -20
          echo "---"
          du -sh resources/bin/*/

      - name: Build
        run: npm run build

      - name: Build Electron (PR)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npx electron-builder --${{ matrix.platform }} --publish never

      - name: Build Electron (Release)
        if: startsWith(github.ref, 'refs/tags/')
        run: npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: tunevault-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          retention-days: 7
